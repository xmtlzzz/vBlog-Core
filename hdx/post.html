<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>vBlog — 文章详情</title>
  <style>
    :root {
      --bg: #fafafa;
      --surface: #ffffff;
      --fg: #171717;
      --muted: #737373;
      --border: #e5e5e5;
      --accent: #2563eb;
      --accent-soft: #eff6ff;
      --nav-bg: rgba(250, 250, 250, 0.85);
      --card-hover: #f5f5f5;
      --tag-bg: #f0f0f0;
      --tag-fg: #525252;
      --code-bg: #f5f5f5;
      --code-border: #e5e5e5;
      --blockquote-border: #d4d4d4;
      --radius: 8px;
      --radius-lg: 12px;
      --font-sans: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', system-ui, sans-serif;
      --font-display: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', system-ui, sans-serif;
      --font-mono: 'JetBrains Mono', 'IBM Plex Mono', ui-monospace, Menlo, monospace;
    }

    [data-theme="dark"] {
      --bg: #0a0a0a;
      --surface: #141414;
      --fg: #ededed;
      --muted: #a3a3a3;
      --border: #262626;
      --accent: #3b82f6;
      --accent-soft: #172554;
      --nav-bg: rgba(10, 10, 10, 0.85);
      --card-hover: #1a1a1a;
      --tag-bg: #1f1f1f;
      --tag-fg: #a3a3a3;
      --code-bg: #1a1a1a;
      --code-border: #2a2a2a;
      --blockquote-border: #3a3a3a;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--fg);
      font-family: var(--font-sans);
      font-size: 15px;
      line-height: 1.6;
      transition: background 0.3s ease, color 0.3s ease;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Nav ── */
    nav.top {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--nav-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      transition: background 0.3s ease, border-color 0.3s ease;
    }
    nav.top .inner {
      max-width: 1080px;
      margin: 0 auto;
      padding: 0 24px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .nav-brand {
      font-family: var(--font-display);
      font-size: 17px;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: var(--fg);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .nav-brand .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent);
    }
    .nav-links {
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .nav-links a {
      font-size: 14px;
      color: var(--muted);
      text-decoration: none;
      padding: 6px 12px;
      border-radius: 6px;
      transition: color 0.15s, background 0.15s;
    }
    .nav-links a:hover, .nav-links a.active {
      color: var(--fg);
      background: var(--card-hover);
    }
    .nav-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .theme-toggle {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--fg);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
      font-size: 16px;
    }
    .theme-toggle:hover { background: var(--card-hover); }

    /* ── Article ── */
    .article {
      max-width: 720px;
      margin: 0 auto;
      padding: 64px 24px 80px;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: var(--muted);
      text-decoration: none;
      margin-bottom: 32px;
      padding: 6px 12px;
      border-radius: 6px;
      border: 1px solid var(--border);
      transition: all 0.15s;
    }
    .back-link:hover { color: var(--fg); border-color: var(--fg); }

    .article-header {
      margin-bottom: 40px;
    }
    .article-meta {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
      font-size: 13px;
      color: var(--muted);
    }
    .article-meta .tag {
      background: var(--tag-bg);
      color: var(--tag-fg);
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 500;
    }
    .article-title {
      font-family: var(--font-display);
      font-size: clamp(28px, 4vw, 36px);
      font-weight: 600;
      letter-spacing: -0.03em;
      line-height: 1.15;
      color: var(--fg);
      margin-bottom: 16px;
    }
    .article-deck {
      font-size: 17px;
      color: var(--muted);
      line-height: 1.6;
      margin-bottom: 20px;
    }
    .article-author {
      display: flex;
      align-items: center;
      gap: 12px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
    }
    .author-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      font-weight: 600;
      color: white;
    }
    .author-name {
      font-weight: 500;
      font-size: 14px;
      color: var(--fg);
    }
    .author-role {
      font-size: 12px;
      color: var(--muted);
    }

    .article-hero {
      width: 100%;
      aspect-ratio: 16 / 9;
      border-radius: var(--radius-lg);
      margin-bottom: 40px;
      background: linear-gradient(135deg, var(--accent-soft), var(--tag-bg));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
      color: var(--accent);
      border: 1px solid var(--border);
    }
    .article-hero-caption {
      font-size: 12px;
      color: var(--muted);
      text-align: center;
      margin-top: 8px;
      margin-bottom: 40px;
    }

    /* ── Body prose ── */
    .article-body {
      font-size: 16px;
      line-height: 1.75;
      color: var(--fg);
    }
    .article-body h2 {
      font-family: var(--font-display);
      font-size: 24px;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: var(--fg);
      margin-top: 48px;
      margin-bottom: 16px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }
    .article-body h3 {
      font-family: var(--font-display);
      font-size: 19px;
      font-weight: 600;
      letter-spacing: -0.01em;
      color: var(--fg);
      margin-top: 32px;
      margin-bottom: 12px;
    }
    .article-body p {
      margin-bottom: 16px;
    }
    .article-body ul, .article-body ol {
      margin-bottom: 16px;
      padding-left: 24px;
    }
    .article-body li {
      margin-bottom: 8px;
    }
    .article-body a {
      color: var(--accent);
      text-decoration: underline;
      text-underline-offset: 2px;
    }
    .article-body a:hover { opacity: 0.8; }

    .article-body code {
      font-family: var(--font-mono);
      font-size: 0.875em;
      background: var(--code-bg);
      border: 1px solid var(--code-border);
      padding: 2px 6px;
      border-radius: 4px;
      font-variant-ligatures: none;
    }
    .article-body pre {
      background: var(--code-bg);
      border: 1px solid var(--code-border);
      border-radius: var(--radius);
      padding: 16px 20px;
      margin-bottom: 20px;
      overflow-x: auto;
      font-family: var(--font-mono);
      font-size: 13px;
      line-height: 1.6;
      font-variant-ligatures: none;
    }
    .article-body pre code {
      background: none;
      border: none;
      padding: 0;
      font-size: inherit;
    }

    .article-body blockquote {
      border-left: 3px solid var(--accent);
      padding: 12px 20px;
      margin: 24px 0;
      background: var(--accent-soft);
      border-radius: 0 var(--radius) var(--radius) 0;
      color: var(--fg);
      font-size: 15px;
    }
    .article-body blockquote p:last-child { margin-bottom: 0; }

    .pull-quote {
      font-family: var(--font-display);
      font-size: 24px;
      font-weight: 500;
      letter-spacing: -0.02em;
      line-height: 1.35;
      color: var(--fg);
      border-left: 3px solid var(--accent);
      padding: 8px 0 8px 24px;
      margin: 40px 0;
    }

    .article-body figure {
      margin: 32px 0;
    }
    .article-body figure .img-placeholder {
      width: 100%;
      aspect-ratio: 16 / 9;
      border-radius: var(--radius);
      background: linear-gradient(135deg, var(--tag-bg), var(--border));
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      font-size: 14px;
      border: 1px solid var(--border);
    }
    .article-body figcaption {
      font-size: 12px;
      color: var(--muted);
      text-align: center;
      margin-top: 8px;
    }

    /* ── Tags row ── */
    .article-tags {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 40px;
      padding-top: 24px;
      border-top: 1px solid var(--border);
    }
    .article-tags .tag {
      background: var(--tag-bg);
      color: var(--tag-fg);
      padding: 4px 12px;
      border-radius: 100px;
      font-size: 12px;
      font-weight: 500;
      text-decoration: none;
      transition: all 0.15s;
    }
    .article-tags .tag:hover { border-color: var(--fg); color: var(--fg); }

    /* ── Nav between posts ── */
    .post-nav {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-top: 48px;
      padding-top: 32px;
      border-top: 1px solid var(--border);
    }
    .post-nav-item {
      padding: 16px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      text-decoration: none;
      color: inherit;
      transition: all 0.15s;
    }
    .post-nav-item:hover { background: var(--card-hover); }
    .post-nav-item.next { text-align: right; }
    .post-nav-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      margin-bottom: 4px;
    }
    .post-nav-title {
      font-family: var(--font-display);
      font-size: 14px;
      font-weight: 600;
      letter-spacing: -0.01em;
      color: var(--fg);
      line-height: 1.35;
    }

    /* ── Footer ── */
    footer {
      max-width: 720px;
      margin: 0 auto;
      padding: 24px 24px 48px;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 13px;
      color: var(--muted);
    }
    footer a {
      color: var(--muted);
      text-decoration: none;
      transition: color 0.15s;
    }
    footer a:hover { color: var(--fg); }
    .footer-links { display: flex; gap: 16px; }

    /* ── TOC ── */
    .toc {
      position: fixed;
      top: 80px;
      right: calc((100vw - 720px) / 2 - 220px);
      width: 180px;
      font-size: 12px;
      color: var(--muted);
      display: none;
    }
    .toc-title {
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 12px;
      font-size: 11px;
    }
    .toc a {
      display: block;
      color: var(--muted);
      text-decoration: none;
      padding: 4px 0;
      border-left: 2px solid transparent;
      padding-left: 12px;
      transition: all 0.15s;
    }
    .toc a:hover, .toc a.active {
      color: var(--fg);
      border-left-color: var(--accent);
    }
    @media (min-width: 1200px) {
      .toc { display: block; }
    }

    /* ── Responsive ── */
    @media (max-width: 640px) {
      .article { padding: 32px 16px 48px; }
      .article-body h2 { font-size: 20px; }
      .pull-quote { font-size: 19px; }
      .post-nav { grid-template-columns: 1fr; }
      footer { padding: 24px 16px 32px; flex-direction: column; gap: 12px; }
      .nav-links a { padding: 6px 8px; font-size: 13px; }
    }

    .fade-in { animation: fadeIn 0.4s ease both; }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <!-- Navigation -->
  <nav class="top">
    <div class="inner">
      <a class="nav-brand" href="index.html"><span class="dot"></span>vBlog</a>
      <div class="nav-links">
        <a href="index.html">首页 Home</a>
        <a href="archives.html">归档 Archives</a>
        <a href="about.html">关于 About</a>
        <a href="tags.html">标签 Tags</a>
      </div>
      <div class="nav-right">
        <a href="admin.html" class="admin-btn" style="font-size:13px;color:var(--muted);text-decoration:none;padding:6px 12px;border-radius:6px;border:1px solid var(--border);transition:all 0.15s;">后台 Admin</a>
        <button class="theme-toggle" onclick="toggleTheme()" aria-label="切换主题"><span class="theme-icon">☀</span></button>
      </div>
    </div>
  </nav>

  <!-- TOC (visible on wide screens) -->
  <nav class="toc" id="toc">
    <div class="toc-title">目录 Contents</div>
  </nav>

  <!-- Article -->
  <article class="article fade-in">
    <a href="index.html" class="back-link">← 返回首页 Back</a>

    <header class="article-header" id="articleHeader">
      <!-- filled by JS -->
    </header>

    <div class="article-hero" id="articleHero">📝</div>
    <p class="article-hero-caption" id="heroCaption"></p>

    <div class="article-body" id="articleBody">
      <!-- filled by JS -->
    </div>

    <div class="article-tags" id="articleTags"></div>

    <nav class="post-nav" id="postNav"></nav>
  </article>

  <!-- Footer -->
  <footer>
    <span>&copy; 2026 vBlog Core · 用代码写作，用文字思考</span>
    <div class="footer-links">
      <a href="#">GitHub</a>
      <a href="#">RSS</a>
      <a href="#">gRPC API</a>
    </div>
  </footer>

  <script>
    // Theme
    function toggleTheme() {
      const html = document.documentElement;
      const current = html.getAttribute('data-theme');
      const next = current === 'dark' ? 'light' : 'dark';
      html.setAttribute('data-theme', next);
      localStorage.setItem('vblog-theme', next);
      updateThemeIcon(next);
    }
    function updateThemeIcon(theme) {
      document.querySelector('.theme-icon').textContent = theme === 'dark' ? '☾' : '☀';
    }
    (function() {
      const saved = localStorage.getItem('vblog-theme');
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      const theme = saved || (prefersDark ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', theme);
      updateThemeIcon(theme);
    })();

    // Article data store
    const ARTICLES = {
      1: {
        title: 'vBlog Core：从零构建一个可自定义组件的极客博客系统',
        tag: '系统设计', date: '2026-05-08', readTime: '8 min', views: '2,341',
        author: 'XMTLZ', authorRole: '全栈工程师 / 极客博主',
        deck: '为什么又造一个博客轮子？因为我想要一个真正轻量、支持组件自定义、前后端分离的博客。',
        heroIcon: '⚡', heroCaption: 'vBlog Core 架构概览 — React + Go + PostgreSQL',
        content: `
          <h2 id="why">为什么又造一个轮子</h2>
          <p>市面上的博客框架已经很多了——Hexo、Hugo、Gatsby、Next.js blog starter……每一个都能在 10 分钟内帮你搭出一个能用的博客。但「能用」和「称手」之间隔着一条巨大的鸿沟。</p>
          <p>我想要的是一个真正属于极客的博客：Markdown 写作，组件可自定义，前后端分离，支持桌面客户端。不是又一个静态站生成器，而是一个有生命力的系统。</p>
          <blockquote><p>写作是思考的延伸。一个好的博客系统应该让写作这件事本身变得愉悦，而不是成为负担。</p></blockquote>

          <h2 id="architecture">技术选型：React + Go + PostgreSQL</h2>
          <p>前端用 React，后端用 Go，数据库用 PostgreSQL。这个组合的好处是每一层都足够轻量，又足够强大。</p>
          <ul>
            <li><strong>React</strong> — 组件化天然适合博客的模块化需求。用户可以自定义 Header、Footer、侧栏，甚至文章的渲染方式。</li>
            <li><strong>Go</strong> — 编译成单个二进制文件，部署简单。标准库的 HTTP 服务器性能足够，不需要框架。</li>
            <li><strong>PostgreSQL</strong> — 每个模块单独一张表，索引按需构建。全文搜索用 tsvector + GIN 索引，不引入 Elasticsearch。</li>
          </ul>

          <figure>
            <div class="img-placeholder">架构示意图 Architecture Diagram</div>
            <figcaption>vBlog Core 的三层架构：React 前端 ↔ Go API Server ↔ PostgreSQL</figcaption>
          </figure>

          <h2 id="components">组件自定义：核心卖点</h2>
          <p>vBlog 最大的特点是组件可自定义。用户可以上传自己的 React 组件，替换博客的任何部分——Header、文章卡片、侧栏小部件、甚至整个布局。</p>
          <p>实现上用了 Module Federation + 沙箱隔离。用户的组件运行在一个独立的微前端环境中，不会影响主应用的稳定性。</p>
          <pre><code>// 用户自定义的文章卡片组件
export default function PostCard({ title, excerpt, date, tag }) {
  return (
    &lt;article className="custom-card"&gt;
      &lt;span className="tag"&gt;{tag}&lt;/span&gt;
      &lt;h3&gt;{title}&lt;/h3&gt;
      &lt;p&gt;{excerpt}&lt;/p&gt;
      &lt;time&gt;{date}&lt;/time&gt;
    &lt;/article&gt;
  );
}</code></pre>

          <div class="pull-quote">组件可自定义不是噱头，是让每个极客的博客真正成为「自己的」博客的关键。</div>

          <h2 id="grpc">gRPC 通信：实时感知内容变化</h2>
          <p>博客 Server 和客户端之间通过 gRPC 双向流通信。客户端可以实时感知文章列表变化、新评论、关注通知。这意味着桌面客户端不需要轮询，体验接近原生应用。</p>
          <p>选择 gRPC 而不是 WebSocket 的原因：</p>
          <ol>
            <li>强类型——Protobuf 定义了清晰的接口契约</li>
            <li>双向流——客户端和服务端都可以主动推送</li>
            <li>多语言支持——Go server + 任意客户端语言</li>
          </ol>

          <h2 id="wails">Wails 客户端：Web 技术栈构建原生桌面应用</h2>
          <p>vBlog 的桌面客户端用 Wails 框架构建。前端 UI 按需选择，遵循简洁轻量化需求。Wails 让 Go 后端和 Web 前端无缝集成，编译出的桌面应用体积小、启动快。</p>
          <blockquote><p>Wails 的核心优势是让你用写 Web 应用的方式写桌面应用，同时保留了 Go 的性能和系统级访问能力。</p></blockquote>

          <h2 id="future">接下来</h2>
          <p>vBlog Core 还在早期阶段。接下来要做的事情：</p>
          <ul>
            <li>完善评论系统——极简设计，不要社交登录</li>
            <li>RSS 输出——让读者可以用阅读器订阅</li>
            <li>多主题支持——不只是暗/亮，还有更多社区主题</li>
            <li>插件系统——让组件自定义更易用</li>
          </ul>
          <p>这是一个为 vibe coder 而建的博客系统。如果你也觉得写作值得一个更好的工具，欢迎关注。</p>
        `
      },
      2: {
        title: '用 Go 实现 gRPC 双向流：让博客客户端实时感知内容变化',
        tag: 'Go', date: '2026-05-05', readTime: '12 min', views: '1,872',
        author: 'XMTLZ', authorRole: '全栈工程师 / 极客博主',
        deck: '博客 Server 和客户端之间通过 gRPC 通信，客户端可以实时感知文章列表变化和关注通知。',
        heroIcon: '⇄', heroCaption: 'gRPC 双向流通信示意图',
        content: `
          <h2 id="why-grpc">为什么选 gRPC</h2>
          <p>博客系统需要实时通信——新文章发布、评论更新、关注通知。常见的选择是 WebSocket，但在 vBlog 的场景下，gRPC 双向流更合适。</p>
          <p>三个关键原因：强类型接口契约、原生双向流支持、多语言客户端兼容。</p>

          <h2 id="proto">定义 Protobuf 接口</h2>
          <pre><code>service BlogService {
  rpc WatchPosts(WatchRequest) returns (stream PostEvent);

      // Hero
      document.getElementById('articleHero').textContent = article.heroIcon;
      document.getElementById('heroCaption').textContent = article.heroCaption;

      // Body
      document.getElementById('articleBody').innerHTML = article.content;

      // Tags
      document.getElementById('articleTags').innerHTML = `<a class="tag" href="tags.html">${article.tag}</a>`;

      // Build TOC
      const headings = document.querySelectorAll('.article-body h2');
      const tocEl = document.getElementById('toc');
      let tocHTML = '<div class="toc-title">目录 Contents</div>';
      headings.forEach(h => {
        tocHTML += `<a href="#${h.id}">${h.textContent}</a>`;
      });
      tocEl.innerHTML = tocHTML;

      // Prev / Next nav
      const ids = Object.keys(ARTICLES).map(Number).sort((a, b) => a - b);
      const idx = ids.indexOf(articleId);
      const prev = idx > 0 ? ARTICLES[ids[idx - 1]] : null;
      const next = idx < ids.length - 1 ? ARTICLES[ids[idx + 1]] : null;
      let navHTML = '';
      if (prev) {
        navHTML += `<a class="post-nav-item prev" href="post.html?id=${ids[idx - 1]}">
          <div class="post-nav-label">← 上一篇 Previous</div>
          <div class="post-nav-title">${prev.title}</div>
        </a>`;
      } else {
        navHTML += '<div></div>';
      }
      if (next) {
        navHTML += `<a class="post-nav-item next" href="post.html?id=${ids[idx + 1]}">
          <div class="post-nav-label">下一篇 Next →</div>
          <div class="post-nav-title">${next.title}</div>
        </a>`;
      }
      document.getElementById('postNav').innerHTML = navHTML;
    }
  </script>
</body>
</html>
